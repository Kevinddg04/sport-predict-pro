name: CI — SportPredict Pro

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────
  # Backend: Lint + Tests
  # ─────────────────────────────────────────
  backend-tests:
    name: Backend Tests (Python 3.11)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Lint with ruff
        working-directory: backend
        run: ruff check . --output-format=github

      - name: Check formatting with black
        working-directory: backend
        run: black --check .

      - name: Run tests (Optional)
        working-directory: backend
        continue-on-error: true
        env:
          DATABASE_URL: sqlite:///./data/test.db
          DEBUG: "true"
          MONTE_CARLO_SIMULATIONS: "10"
        run: |
          mkdir -p data/raw data/processed data/models
          pytest || true

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        with:
          file: backend/coverage.xml
          flags: backend
        continue-on-error: true  # No falla si Codecov no está configurado

  # ─────────────────────────────────────────
  # Frontend: Build check
  # ─────────────────────────────────────────
  frontend-build:
    name: Frontend Build (Node 20)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint || true  # No bloquea el CI por lint warnings

      - name: Build
        working-directory: frontend
        env:
          VITE_API_URL: http://localhost:8000
        run: npm run build

      - name: Check build size
        working-directory: frontend
        run: du -sh dist/

  # ─────────────────────────────────────────
  # Docker: Build check
  # ─────────────────────────────────────────
  docker-check:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-build]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t sportpredict-backend ./backend

      - name: Build frontend image
        run: docker build -t sportpredict-frontend ./frontend
